<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NULL.{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <div class="brand">
                <a href="{{ url_for('home') }}">NULL.</a>
            </div>

            <div class="nav-links">
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('basket') }}">Basket ({{ basket_count }})</a>
                <a href="{{ url_for('checkout') }}">Checkout</a>

                {% if current_user.is_authenticated %}
                    <span class="nav-user">Hello, {{ current_user.username }}</span>
                    <a href="{{ url_for('logout') }}">Log Out</a>
                {% else %}
                    <a href="{{ url_for('login') }}">Log In</a>
                    <a href="{{ url_for('register') }}">Register</a>
                {% endif %}
            </div>
        </nav>

        {% block hero %}
        <section class="hero">
            <h1>NULL.</h1>
            <p>Luxury objects for emotionally expensive lives.</p>
        </section>
        {% endblock %}
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
